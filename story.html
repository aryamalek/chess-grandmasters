<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>The Grandmasters — a scrollable history</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: #0a0c12; color: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; }

  #storyStage { position: relative; }

  #stickyStage {
    position: sticky; top: 0; height: 100vh; /* JS overrides this per-breakpoint on load */
    background: #0a0c12; overflow: hidden;
    display: flex; flex-direction: column;
  }

  #stage { position: relative; flex: 1 1 auto; min-height: 0; perspective: 700px; }

  /* fluid sizing: scales continuously with viewport width (like the circle grid does
     in JS) instead of snapping at a single breakpoint. Anchored between ~390px (phone)
     and ~2000px (wide desktop) — no line-length cap, so text uses the dock's full width
     and grows to match it, rather than sitting as a narrow column on a wide screen. */
  #captionDock {
    position: relative;
    flex: 0 0 auto; height: clamp(172px, 6vw + 150px, 260px);
    box-sizing: border-box; padding: clamp(18px, 0.5vw + 16px, 26px) clamp(22px, 2.6vw + 12px, 64px) clamp(26px, 0.5vw + 24px, 34px);
    display: flex; flex-direction: row; align-items: center; gap: clamp(24px, 3vw, 56px);
    background: #0a0c12; border-top: 1px solid rgba(255,255,255,0.06);
  }
  /* fills left-to-right as you scroll through the current pause zone — how much further
     until this beat's fully revealed. Hidden during growth zones (nothing to "get through"
     there, it's continuous ticking, not a threshold-gated reveal). */
  #pauseProgress {
    position: absolute; top: 0; left: 0; right: 0; height: 3px;
    background: rgba(255,255,255,0.08); transition: opacity 300ms ease; opacity: 0;
  }
  #pauseProgressFill { height: 100%; width: 0%; background: #d4af6a; }
  /* left region: everything from the screen edge to the stat block's left edge — body
     text is centered WITHIN that region (not the whole dock), so it never sits under
     or competes with the year/total block on the right. */
  #capTextArea { flex: 1 1 auto; min-width: 0; text-align: center; }
  #capStep {
    font-size: clamp(10px, 0.3vw + 9px, 13px); letter-spacing: 0.12em; text-transform: uppercase;
    color: rgba(255,255,255,0.4); margin-bottom: clamp(6px, 0.3vw + 5px, 9px); transition: opacity 260ms ease;
    -webkit-text-size-adjust: 100%; text-size-adjust: 100%;
  }
  #capBody {
    font-size: clamp(17px, 0.68vw + 14.3px, 28px); line-height: 1.45; color: rgba(255,255,255,0.92); width: 100%;
    transition: opacity 260ms ease;
    -webkit-text-size-adjust: 100%; text-size-adjust: 100%;
  }
  /* right region: year + running total, both big and prominent — the total is the
     larger of the two (it's the number that keeps growing, the real payoff of scrubbing). */
  #capStat { flex: 0 0 auto; text-align: right; transition: opacity 260ms ease; }
  #capYear {
    font-size: clamp(22px, 1.1vw + 16px, 42px); font-weight: 700; letter-spacing: 0.01em; color: #d4af6a;
    line-height: 1; -webkit-text-size-adjust: 100%; text-size-adjust: 100%;
  }
  #capTotal {
    font-size: clamp(32px, 2.3vw + 20px, 72px); font-weight: 800; color: #fff; line-height: 1;
    margin-top: clamp(4px, 0.5vw + 2px, 10px); font-variant-numeric: tabular-nums;
    -webkit-text-size-adjust: 100%; text-size-adjust: 100%;
  }
  #capTotalLabel {
    font-size: clamp(9px, 0.25vw + 8px, 12px); letter-spacing: 0.1em; text-transform: uppercase;
    color: rgba(255,255,255,0.4); margin-top: clamp(3px, 0.2vw + 2px, 6px);
  }

  /* below this width the side-by-side split doesn't leave body text enough room to
     wrap without overflowing the dock — stack text above the stat block instead,
     both centered, matching how this used to lay out before the stat block existed. */
  @media (max-width: 640px) {
    #captionDock { flex-direction: column; height: auto; min-height: clamp(210px, 30vw + 130px, 260px); gap: clamp(10px, 2vw, 18px); }
    #capTextArea, #capStat { text-align: center; }
  }

  #steps { position: relative; margin-top: -100vh; pointer-events: none; } /* JS sets both this and its own height — it's the scroll track */

  .credit { max-width: 640px; margin: 0 auto; padding: 40px 24px 80px; font-size: 13px; color: rgba(255,255,255,0.45); }
  .credit a { color: rgba(255,255,255,0.65); }

  #gmTooltip {
    position: fixed; z-index: 10; pointer-events: none;
    background: #17191f; border: 1px solid rgba(255,255,255,0.12); border-radius: 6px;
    padding: 8px 11px; box-shadow: 0 6px 20px rgba(0,0,0,0.45);
    opacity: 0; transform: translate(-50%, -100%) translateY(-10px);
    transition: opacity 140ms ease, transform 140ms ease;
    white-space: nowrap;
  }
  #gmTooltip.visible { opacity: 1; transform: translate(-50%, -100%) translateY(-14px); }
  /* flips below the circle when there's no room above it (e.g. the top row) */
  #gmTooltip.below { transform: translate(-50%, 0) translateY(10px); }
  #gmTooltip.below.visible { transform: translate(-50%, 0) translateY(14px); }
  #gmTooltip .name { font-size: 13px; font-weight: 600; color: #fff; }
  #gmTooltip .meta { font-size: 11px; color: rgba(255,255,255,0.55); margin-top: 2px; }
</style>
</head>
<body>

<div id="gmTooltip"><div class="name"></div><div class="meta"></div></div>

<div id="storyStage">
  <div id="stickyStage">
    <div id="stage"></div>
    <div id="captionDock">
      <div id="pauseProgress">
        <div id="pauseProgressFill"></div>
      </div>
      <div id="capTextArea">
        <div id="capStep"></div>
        <div id="capBody"></div>
      </div>
      <div id="capStat">
        <div id="capYear"></div>
        <div id="capTotal"></div>
        <div id="capTotalLabel">Grandmasters</div>
      </div>
    </div>
  </div>

  <div id="steps"></div>
</div>

<p class="credit">Data: FIDE grandmaster titles, 1950–present. Dissolved federations (Soviet Union, Czechoslovakia, Yugoslavia, East/West Germany) are shown under their principal present-day successor state.</p>

<script>
(function() {
  const storyStage = document.getElementById('storyStage');
  const stickyStage = document.getElementById('stickyStage');
  const steps = document.getElementById('steps');
  const stage = document.getElementById('stage');
  const capStep = document.getElementById('capStep');
  const capStat = document.getElementById('capStat');
  const capYear = document.getElementById('capYear');
  const capTotal = document.getElementById('capTotal');
  const capBody = document.getElementById('capBody');

  const pauseProgress = document.getElementById('pauseProgress');
  const pauseProgressFill = document.getElementById('pauseProgressFill');

  // Timeline: PAUSES are the fixed narrative beats (reusing the existing facts/copy).
  // Scrolling between two pauses smoothly ticks the year (and the GM count with it)
  // rather than jump-cutting — this is the first pause->continue cycle as a template;
  // more pauses get appended to this array later.
  const PAUSES = [
    { year: 1950, hl: 'ussr', eyebrow: '1950',
      body: "Eleven of the 27 are already Soviet. One country dominates before the rivalry even has a name." },
    { year: 1955, hl: 'ar', eyebrow: '1950–1955',
      body: "Miguel Najdorf is stranded in Argentina in 1939. His family dies in the Holocaust; he stays. By 1955, Argentina has its first homegrown grandmaster." },
    { year: 2026, hl: '', eyebrow: '1950–2026',
      body: "From 27 to 2,143. Seven decades of grandmasters, one title at a time." },
  ];
  const PAUSE_VH = 2.0, YEAR_VH = 0.3, TAIL_VH = 1.0;
  // growth scroll is allocated PER YEAR (not as one fixed span for the whole zone), so
  // every individual year gets an equal, guaranteed slice of scroll — a 5-year gap and a
  // 50-year gap both feel equally deliberate, rather than the longer one blurring past.
  function growthPxFor(fromP, toP) {
    return window.innerHeight * YEAR_VH * (toP.year - fromP.year);
  }
  function trackHeightPx() {
    const h = window.innerHeight;
    let total = h*PAUSE_VH*PAUSES.length + h*TAIL_VH;
    for (let i = 0; i < PAUSES.length - 1; i++) total += growthPxFor(PAUSES[i], PAUSES[i+1]);
    return total;
  }
  // which zone a given scroll-track position falls in: a pause (holds on one year) or
  // a growth stretch (interpolating between the pause before and after it)
  function computeZone(scrolled) {
    const h = window.innerHeight;
    const pausePx = h*PAUSE_VH;
    let cursor = 0;
    for (let i = 0; i < PAUSES.length; i++) {
      if (scrolled < cursor + pausePx) {
        const progress = Math.max(0, Math.min(1, (scrolled-cursor)/pausePx));
        return { type: 'pause', index: i, key: 'pause-'+i, progress };
      }
      cursor += pausePx;
      if (i < PAUSES.length - 1) {
        const growthPx = growthPxFor(PAUSES[i], PAUSES[i+1]);
        if (scrolled < cursor + growthPx) {
          const t = Math.max(0, Math.min(1, (scrolled-cursor)/growthPx));
          return { type: 'growth', from: i, to: i+1, t, key: 'growth-'+i };
        }
        cursor += growthPx;
      }
    }
    // tail: hold on the last pause, fully revealed (progress 1)
    return { type: 'pause', index: PAUSES.length-1, key: 'pause-'+(PAUSES.length-1), progress: 1 };
  }
  function countUpToYear(GM, year) {
    let lo = 0, hi = GM.length;
    while (lo < hi) { const mid = (lo+hi)>>1; if (+GM[mid].title_year <= year) lo = mid+1; else hi = mid; }
    return lo;
  }

  const tooltip = document.getElementById('gmTooltip');
  const tooltipName = tooltip.querySelector('.name');
  const tooltipMeta = tooltip.querySelector('.meta');
  function showTooltip(node, gm) {
    tooltipName.textContent = gm.name;
    tooltipMeta.textContent = `${gm.federation} • ${gm.title_year}`;
    const r = node.getBoundingClientRect();
    const below = r.top < 70; // not enough room above near the top edge — flip it under the circle instead
    tooltip.classList.toggle('below', below);
    // measure after the text is set (opacity:0 still lays out normally) so we can keep
    // the box fully on-screen for circles near the left/right edge too.
    const half = tooltip.offsetWidth / 2;
    const cx = Math.max(half + 8, Math.min(window.innerWidth - half - 8, r.left + r.width / 2));
    tooltip.style.left = cx + 'px';
    tooltip.style.top = (below ? r.bottom : r.top) + 'px';
    tooltip.classList.add('visible');
  }
  function hideTooltip() { tooltip.classList.remove('visible'); }

  // always full viewport width and height — real phones are already portrait-shaped,
  // so forcing an exact 9:16 box (rather than the device's actual, usually taller,
  // proportions) just left a gap between the box and the real edge of the screen.
  // The grid's own aspect-fitting (below) picks an appropriately portrait layout
  // for whatever box it's actually given, no artificial ratio needed.
  function layoutStage() {
    const h = window.innerHeight;
    stickyStage.style.height = h + 'px';
    steps.style.height = trackHeightPx() + 'px';
    steps.style.marginTop = (-h) + 'px';
  }
  layoutStage();

  const BASE = 100;
  const EASE = 'cubic-bezier(.16,1,.3,1)';
  const MOVE_MS = 560;
  const MAX_STAGGER_MS = 220;

  const KING = `<svg viewBox="0 0 45 45" fill="currentColor"><g stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M22.5 11.63V6M20 8h5" stroke-width="1.5"/><path d="M22.5 25s4.5-7.5 3-10.5c0 0-1-2.5-3-2.5s-3 2.5-3 2.5c-1.5 3 3 10.5 3 10.5" fill="currentColor" stroke-linecap="butt"/><path d="M11.5 37c5.5 3.5 15.5 3.5 21 0v-7s9-4.5 6-10.5c-4-6.5-13.5-3.5-16 4V27v-3.5c-2.5-7.5-12-10.5-16-4-3 6 6 10.5 6 10.5v7z" fill="currentColor"/></g></svg>`;
  const QUEEN = `<svg viewBox="0 0 45 45" fill="currentColor"><g stroke="currentColor" stroke-width="1.5" fill="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M9 13a2 2 0 11-4 0 2 2 0 114 0zM36.5 13a2 2 0 11-4 0 2 2 0 114 0zM22.5 9.5a2 2 0 11-4 0 2 2 0 114 0zM32 14a2 2 0 11-4 0 2 2 0 114 0zM13 14a2 2 0 11-4 0 2 2 0 114 0z"/><path d="M9 26c8.5-1.5 21-1.5 27 0l2.5-12.5-7 11-.5-13.5-5.5 12L22.5 10l-2.5 13.5-5.5-12L14 25.5l-7-11L9 26z" stroke-linecap="butt"/><path d="M9 26c0 2 1.5 2 2.5 4 1 1.5 1 1 .5 3.5-1.5 1-1.5 2.5-1.5 2.5-1.5 1.5.5 2.5.5 2.5 6.5 1 16.5 1 23 0 0 0 1.5-1 0-2.5 0 0 .5-1.5-1-2.5-.5-2.5-.5-2 .5-3.5 1-2 2.5-2 2.5-4-8.5-1.5-18.5-1.5-27 0z" stroke-linecap="butt"/></g></svg>`;

  // minimal quote-aware CSV line split — fields are only quoted when they contain a
  // comma (e.g. "Last, First"), so a plain split(',') breaks on unquoted single-word names.
  function splitCSVLine(line) {
    const cells = [];
    let cur = '', inQuotes = false;
    for (let i = 0; i < line.length; i++) {
      const c = line[i];
      if (c === '"') { inQuotes = !inQuotes; continue; }
      if (c === ',' && !inQuotes) { cells.push(cur); cur = ''; continue; }
      cur += c;
    }
    cells.push(cur);
    return cells;
  }

  function parseCSV(text) {
    const lines = text.trim().split(/\r?\n/);
    const header = splitCSVLine(lines[0]);
    return lines.slice(1).map(line => {
      const cells = splitCSVLine(line);
      const row = {};
      header.forEach((key, i) => { row[key] = cells[i]; });
      return row;
    });
  }

  function makeStableGrid() {
    let cols = 0, rows = 0;
    const emptyQueue = [];
    const slots = [];
    function grow(targetAspect) {
      if (cols === 0) { cols = 1; rows = 1; emptyQueue.push({row:0,col:0}); return; }
      const aspectIfCol = (cols + 1) / rows;
      const aspectIfRow = cols / (rows + 1);
      const addCol = Math.abs(Math.log(aspectIfCol/targetAspect)) <= Math.abs(Math.log(aspectIfRow/targetAspect));
      if (addCol) { const nc = cols; cols += 1; for (let r=0;r<rows;r++) emptyQueue.push({row:r,col:nc}); }
      else { const nr = rows; rows += 1; for (let c=0;c<cols;c++) emptyQueue.push({row:nr,col:c}); }
    }
    return {
      seed(n0, targetAspect) {
        cols = Math.max(1, Math.round(Math.sqrt(n0 * targetAspect)));
        rows = Math.ceil(n0 / cols);
        for (let i = 0; i < n0; i++) slots[i] = { row: Math.floor(i/cols), col: i % cols };
        for (let i = n0; i < cols*rows; i++) emptyQueue.push({ row: Math.floor(i/cols), col: i % cols });
      },
      slotFor(i, targetAspect) {
        if (slots[i]) return slots[i];
        while (emptyQueue.length === 0) grow(targetAspect);
        const s = emptyQueue.shift(); slots[i] = s; return s;
      },
      dims() { return { cols, rows }; }
    };
  }

  fetch('data.csv', { cache: 'no-store' }).then(r => r.text()).then(text => {
    const GM = parseCSV(text);
    init(GM);
  });

  function init(GM) {
    let grid = makeStableGrid();
    const els = [];
    let highlight = '';
    // true while scroll-scrubbing through a growth zone: positions should track the
    // scroll position 1:1 with no transition lag. False for a pause reveal, where the
    // eased transition is the point (a deliberate one-time animated move, not a scrub).
    let scrubbing = false;
    let lastCols = 0, lastRows = 0; // detects grid reshapes (a new row/col added) so that
    // specific moment can get a brief eased transition even while otherwise scrubbing instantly

    function ensureEl(i) {
      if (els[i]) return els[i];
      const gm = GM[i];
      const node = document.createElement('div');
      node.style.position='absolute'; node.style.left='0'; node.style.top='0';
      node.style.width=BASE+'px'; node.style.height=BASE+'px';
      node.style.marginLeft=(-BASE/2)+'px'; node.style.marginTop=(-BASE/2)+'px';
      node.style.transformOrigin='center center'; node.style.opacity='0';

      const inner = document.createElement('div');
      inner.style.position='relative'; inner.style.width='100%'; inner.style.height='100%';
      inner.style.transformStyle='preserve-3d';
      inner.style.transition='transform 620ms cubic-bezier(.34,1.2,.4,1)';

      const front = document.createElement('div');
      front.style.position='absolute'; front.style.inset='0'; front.style.borderRadius='50%';
      front.style.display='flex'; front.style.alignItems='center'; front.style.justifyContent='center';
      front.style.backfaceVisibility='hidden';
      front.style.background='radial-gradient(circle at 35% 30%, #7a7a7e, #55555a 75%)';
      front.style.boxShadow='inset 0 0 0 1px rgba(255,255,255,0.08), 0 1px 3px rgba(0,0,0,0.4)';
      front.style.color='#c9c9ce';
      const iconWrap = document.createElement('div');
      iconWrap.style.width='58%'; iconWrap.style.height='58%';
      iconWrap.innerHTML = gm.sex === 'F' ? QUEEN : KING;
      front.appendChild(iconWrap);

      const back = document.createElement('div');
      back.style.position='absolute'; back.style.inset='0'; back.style.borderRadius='50%';
      back.style.backfaceVisibility='hidden'; back.style.transform='rotateY(180deg)';
      // circle-flags (MIT, github.com/HatScripts/circle-flags) ships each flag pre-composed
      // for a circular frame — the source SVG is already a circle with the design correctly
      // positioned inside it, so there's no rectangle-into-circle cropping to solve at all,
      // for any country, not just ones we happen to test. Beats fighting background-position
      // per flag (what broke for USSR) or letterboxing (correct but visually smaller/duller).
      if (gm.flag) {
        const file = gm.flag === 'ussr' ? 'soviet_union' : gm.flag;
        back.style.backgroundImage = `url(https://cdn.jsdelivr.net/gh/HatScripts/circle-flags@gh-pages/flags/${file}.svg)`;
        back.style.backgroundSize = 'cover'; back.style.backgroundPosition = 'center';
      } else {
        back.style.background = '#3a3a3f';
      }
      back.style.boxShadow='0 0 0 1.5px #ffffff, 0 0 12px 2px rgba(255,255,255,0.35)';

      inner.appendChild(front); inner.appendChild(back);
      node.appendChild(inner);
      stage.appendChild(node);

      node.dataset.flag = gm.flag || ''; node.dataset.placed = '0';
      node._inner = inner;
      node.addEventListener('pointerenter', () => showTooltip(node, gm));
      node.addEventListener('pointerleave', hideTooltip);
      els[i] = node;
      return node;
    }

    function place(node, cx, cy, r, delayMs, reshaped) {
      const scale = (r*2)/BASE;
      const isHl = highlight && node.dataset.flag === highlight;
      node._inner.style.transitionDelay = '0ms';
      node._inner.style.transform = isHl ? 'rotateY(180deg)' : 'rotateY(0deg)';

      if (node.dataset.placed === '0') {
        const finalTransform = `translate(${cx}px, ${cy}px) scale(${scale})`;
        if (scrubbing) {
          // new circles still get a quick fade+grow entrance even while scrubbing —
          // only THEIR pop-in animates; existing circles keep tracking the scroll
          // position instantly, so this doesn't introduce any lag relative to scroll.
          node.style.transition = 'none';
          node.style.transform = `translate(${cx}px, ${cy}px) scale(${scale * 0.55})`;
          node.style.opacity = '0';
          node.offsetHeight; // force the browser to commit the state above before transitioning away from it — a single rAF isn't reliable for this
          node.style.transition = 'transform 240ms ease-out, opacity 240ms ease-out';
          node.style.transform = finalTransform;
          node.style.opacity = '1';
          node.dataset.entering = '1';
          clearTimeout(node._enterTimer);
          node._enterTimer = setTimeout(() => { node.dataset.entering = '0'; }, 240);
        } else {
          node.style.transition = 'opacity 240ms ease-out';
          node.style.transitionDelay = '0ms';
          node.style.transform = finalTransform;
          requestAnimationFrame(() => { node.style.opacity = '1'; });
        }
        node.dataset.placed = '1';
      } else if (scrubbing) {
        if (node.dataset.entering === '1') {
          // still mid entrance-animation from a moment ago (the very next scroll tick
          // can fire well before the 240ms fade finishes) — update its target position
          // only, without resetting transition:none, or the fade never gets to play.
          node.style.transform = `translate(${cx}px, ${cy}px) scale(${scale})`;
        } else if (reshaped) {
          // a row/col was just added — every circle resized at once, so smooth THIS
          // specific move instead of snapping, then drop back to instant tracking.
          node.style.transition = 'transform 220ms ease-out';
          node.style.transitionDelay = '0ms';
          node.style.transform = `translate(${cx}px, ${cy}px) scale(${scale})`;
          node.style.opacity = '1';
        } else {
          node.style.transition = 'none';
          node.style.transform = `translate(${cx}px, ${cy}px) scale(${scale})`;
          node.style.opacity = '1';
        }
      } else {
        node.style.transition = `transform ${MOVE_MS}ms ${EASE}, opacity 320ms ease-out`;
        node.style.transitionDelay = `${delayMs}ms`;
        node.style.transform = `translate(${cx}px, ${cy}px) scale(${scale})`;
        node.style.opacity = '1';
      }
    }

    function render(n, forceInstant) {
      const W = stage.clientWidth;
      const H = stage.clientHeight;
      for (let i=0;i<n;i++) ensureEl(i);
      while (els.length > n) {
        const node = els.pop();
        node.style.transition = `transform ${MOVE_MS}ms ${EASE}, opacity 220ms ease-out`;
        const cur = node.style.transform || 'scale(0)';
        node.style.transform = cur.replace(/scale\([^)]*\)/, 'scale(0)');
        node.style.opacity = '0';
        setTimeout(() => node.remove(), MOVE_MS);
      }
      const aspect = W / H;
      if (grid.dims().cols === 0 && n > 0) grid.seed(n, aspect);

      const slotsForN = [];
      let maxRow = 0, maxCol = 0;
      for (let i = 0; i < n; i++) {
        const s = grid.slotFor(i, aspect);
        slotsForN.push(s);
        if (s.row > maxRow) maxRow = s.row;
        if (s.col > maxCol) maxCol = s.col;
      }
      // size cells off the bounding box actually used by the current n (not the grid's
      // lifetime-max cols/rows) so scrolling back to a lower count rescales up correctly.
      const cols = maxCol + 1, rows = maxRow + 1;
      // reserve the top/bottom gaps from the height budget BEFORE sizing cells, not after —
      // sizing first and patching the position afterward can't guarantee both gaps at once
      // when the grid is height-bound (cell size leaves no slack to carve a gap out of).
      // Insets scale with a first-pass cell estimate but never shrink below a fixed floor,
      // so the gap stays visible even with hundreds of tiny circles.
      const cellEstimate = Math.min(W/cols, H/rows);
      const topInset = Math.max(12, cellEstimate * 0.18);
      const bottomGap = Math.max(12, cellEstimate * 0.18);
      const Hgrid = Math.max(0, H - topInset - bottomGap);
      const cell = Math.min(W/cols, Hgrid/rows);
      const r = cell * 0.44;
      const offX = (W-cols*cell)/2, offY = topInset + (Hgrid - rows*cell);

      // adding a row/col resizes every existing circle at once (a real, if occasional,
      // structural change) — even while otherwise scrubbing instantly, that specific
      // moment gets a brief eased transition instead of a jarring simultaneous snap.
      const reshaped = !forceInstant && (cols !== lastCols || rows !== lastRows);
      lastCols = cols; lastRows = rows;

      for (let i=0;i<n;i++) {
        const slot = slotsForN[i];
        const cx = offX+slot.col*cell+cell/2, cy = offY+slot.row*cell+cell/2;
        const delay = rows > 1 ? Math.min(MAX_STAGGER_MS, (slot.row/Math.max(1,rows-1))*MAX_STAGGER_MS) : 0;
        place(els[i], cx, cy, r, delay, reshaped);
      }
    }

    let currentKey = null;

    // two states only: travelling (growth) or highlighting (pause) — never a mix. The
    // instant a pause starts, the highlight, the text, and the progress slider all
    // appear together; the slider then just tracks how far through this beat you are.
    function updatePause(p, index, progress, isNewZone) {
      if (isNewZone) {
        const count = countUpToYear(GM, p.year);
        scrubbing = false;
        highlight = p.hl;
        render(count);

        capStep.textContent = `${String(index + 1).padStart(2, '0')} / ${String(PAUSES.length).padStart(2, '0')}`;
        capYear.textContent = p.eyebrow;
        capTotal.textContent = count.toLocaleString();
        capBody.textContent = p.body;
        capStep.style.opacity = '1'; capStat.style.opacity = '1'; capBody.style.opacity = '1';
      }

      pauseProgress.style.opacity = '1';
      pauseProgressFill.style.width = (progress * 100) + '%';
    }

    // continuous scroll-scrubbing between two pauses: year and running total track the
    // scroll position directly, no timers, no eased transition (the scroll IS the motion).
    function updateGrowth(fromP, toP, t) {
      const year = Math.round(fromP.year + (toP.year - fromP.year) * t);
      const count = countUpToYear(GM, year);
      scrubbing = true;
      highlight = '';
      capStep.style.opacity = '0'; capBody.style.opacity = '0';
      capStat.style.opacity = '1';
      capYear.textContent = String(year);
      capTotal.textContent = count.toLocaleString();
      render(count);
      pauseProgress.style.opacity = '0';
    }

    // position:sticky always takes about one box-height of scroll to release, and during
    // that release the top of the grid scrolls away first while the caption (anchored to
    // the box's bottom) lingers — reading as the visualization tearing apart / spilling
    // past its own caption. Fade the whole stage out just before release begins so it's
    // already invisible by the time that would happen, dissolving into the credit line.
    const RELEASE_FADE_PX = 260;
    function updateEndFade() {
      const distanceToRelease = storyStage.getBoundingClientRect().bottom - window.innerHeight;
      const opacity = Math.max(0, Math.min(1, distanceToRelease / RELEASE_FADE_PX));
      stickyStage.style.opacity = opacity;
    }

    function onScroll() {
      const scrolled = Math.max(0, Math.min(trackHeightPx(), window.scrollY));
      const zone = computeZone(scrolled);
      if (zone.type === 'pause') {
        const isNewZone = zone.key !== currentKey;
        currentKey = zone.key;
        updatePause(PAUSES[zone.index], zone.index, zone.progress, isNewZone);
      } else {
        currentKey = zone.key;
        updateGrowth(PAUSES[zone.from], PAUSES[zone.to], zone.t);
      }
      updateEndFade();
      hideTooltip(); // avoid a stale tooltip if a highlight transition moves the circle out from under a stationary cursor
    }

    // don't autoplay the first reveal on load — sit on a neutral grey grid until the
    // user actually scrolls into pause zero's range themselves. If the page loads
    // already scrolled (e.g. scroll restoration), fall back to the normal scroll-driven
    // state instead of forcing grey.
    function renderInitialGrey() {
      scrubbing = false;
      highlight = '';
      capStep.style.opacity = '0'; capStat.style.opacity = '0'; capBody.style.opacity = '0';
      pauseProgress.style.opacity = '0'; pauseProgressFill.style.width = '0%';
      render(countUpToYear(GM, PAUSES[0].year));
    }

    window.addEventListener('scroll', onScroll, { passive: true });
    if (window.scrollY === 0) { renderInitialGrey(); } else { onScroll(); }
    window.addEventListener('resize', () => {
      layoutStage();
      // the stable grid's column/row shape is chosen once and then kept fixed on purpose
      // (that's what keeps scroll-driven growth reflow-free) — but that means it's still
      // holding whatever shape fit the *old* container. A resize changes the container's
      // own aspect ratio, so pick a fresh shape for it rather than squeezing the old one in.
      grid = makeStableGrid();
      // re-render the CURRENT zone's state instantly (not a replayed reveal) — a resize
      // shouldn't restart the grey/highlight animation, just reshape the existing grid.
      const scrolled = Math.max(0, Math.min(trackHeightPx(), window.scrollY));
      const zone = computeZone(scrolled);
      scrubbing = true;
      if (zone.type === 'pause') {
        const p = PAUSES[zone.index];
        highlight = p.hl;
        render(countUpToYear(GM, p.year), true);
      } else {
        const fromP = PAUSES[zone.from], toP = PAUSES[zone.to];
        const year = Math.round(fromP.year + (toP.year - fromP.year) * zone.t);
        highlight = '';
        render(countUpToYear(GM, year), true);
      }
      updateEndFade();
    });
  }
})();
</script>
</body>
</html>
